<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .music-card-selected {
            border-color: #735c00 !important;
            background-color: #F9EBC8 !important;
            box-shadow: 0 10px 25px -5px rgba(115, 92, 0, 0.1);
        }
        .waveform-bar {
            animation: wave-animation 1s ease-in-out infinite alternate;
        }
        @keyframes wave-animation {
            from { height: 4px; }
            to { height: 16px; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-soft-cream min-h-screen flex flex-col font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header Navigation (Simplified for Wizard Context) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 px-margin-mobile md:px-margin-desktop py-4 flex justify-between items-center max-w-container-max mx-auto left-0 right-0">

<div class="flex items-center gap-2">

<div class="w-24 h-2 bg-surface-container rounded-full overflow-hidden">

</div>
</div>

<h1 class="font-headline-md-mobile md:font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-4">Qual o ritmo dessa história?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Escolha o estilo musical que melhor combina com vocês.</p>
</div>

<!-- MPB Card -->
<button class="group flex flex-col items-start p-6 rounded-xl glass-card text-left transition-all duration-300 hover:scale-[1.02] border-2 border-transparent active:scale-95" onclick="selectStyle(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-4 group-hover:bg-gold-glimmer transition-colors">
<span class="material-symbols-outlined text-primary">favorite</span>
</div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-1">MPB</h3>
<p class="font-label-md text-label-md text-on-surface-variant mb-4">Aconchegante</p>
<div class="hidden waveform flex gap-1 items-end h-4">
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.3s"></div>
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.2s"></div>
</div>
</button>
<!-- Pop Card -->
<button class="group flex flex-col items-start p-6 rounded-xl glass-card text-left transition-all duration-300 hover:scale-[1.02] border-2 border-transparent active:scale-95" onclick="selectStyle(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-4 group-hover:bg-gold-glimmer transition-colors">
<span class="material-symbols-outlined text-primary">celebration</span>
</div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-1">Pop</h3>
<p class="font-label-md text-label-md text-on-surface-variant mb-4">Alegre</p>
<div class="hidden waveform flex gap-1 items-end h-4">
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.3s"></div>
<div class="w-1 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.2s"></div>
</div>
</button>

<button class="group flex flex-col items-start p-6 rounded-xl glass-card text-left transition-all duration-300 hover:scale-[1.02] border-2 border-transparent active:scale-95" onclick="selectStyle(this)">

<script>
        function selectStyle(element) {
            // Remove selection from all cards
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('music-card-selected');
                const wave = btn.querySelector('.waveform');
                if (wave) wave.classList.add('hidden');
            });

            // Add selection to clicked card
            element.classList.add('music-card-selected');
            const currentWave = element.querySelector('.waveform');
            if (currentWave) currentWave.classList.remove('hidden');

            // Haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
