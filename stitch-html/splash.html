<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(169, 53, 57, 0.1); }
            50% { box-shadow: 0 0 40px rgba(169, 53, 57, 0.25); }
        }

        @keyframes shimmer {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 0.7; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        .animate-floating {
            animation: floating 4s ease-in-out infinite;
        }

        .animate-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .shimmer-particle {
            animation: shimmer 2s infinite ease-in-out;
        }

        .glass-blur {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-soft-cream flex items-center justify-center min-h-screen overflow-hidden">
<!-- Subtle Background Atmosphere -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative flex flex-col items-center justify-center px-margin-mobile text-center z-10">
<!-- Animated Brand Visual -->
<div class="relative mb-12">
<!-- Decorative Shimmer Particles -->
<span class="material-symbols-outlined absolute -top-8 -left-8 text-secondary/30 shimmer-particle" style="font-size: 24px;">auto_awesome</span>
<span class="material-symbols-outlined absolute -bottom-4 -right-10 text-primary/30 shimmer-particle" style="animation-delay: 0.5s; font-size: 32px;">star</span>
<span class="material-symbols-outlined absolute top-4 -right-12 text-secondary/40 shimmer-particle" style="animation-delay: 1.2s; font-size: 20px;">spark</span>
<!-- Center Magic Card -->
<div class="animate-floating">
<div class="w-48 h-48 md:w-56 md:h-56 bg-surface-container-lowest rounded-[32px] p-6 shadow-xl animate-glow flex items-center justify-center relative overflow-hidden glass-blur">
<!-- Glass Texture Overlay -->
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent pointer-events-none"></div>
<!-- Inner QR Representational Graphic -->
<div class="w-full h-full border-4 border-dashed border-outline-variant/40 rounded-2xl flex items-center justify-center flex-col gap-4">
<span class="material-symbols-outlined text-primary" style="font-size: 64px; font-variation-settings: 'FILL' 1;">qr_code_2</span>
<div class="flex gap-2">
<div class="w-2 h-2 bg-secondary rounded-full"></div>
<div class="w-2 h-2 bg-secondary/60 rounded-full"></div>
<div class="w-2 h-2 bg-secondary/30 rounded-full"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Brand Identity -->
<div class="space-y-4 mb-16">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tight">
                QR <span class="text-on-surface">Mágico</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
                Transformando momentos técnicos em memórias físicas.
            </p>
</div>
<!-- Loading State -->
<div class="flex flex-col items-center gap-6">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
</div>
<p class="font-label-md text-label-md text-primary tracking-widest uppercase opacity-80">
                Preparando a sua magia...
            </p>
</div>
</main>
<!-- Footer Identity (Non-intrusive) -->
<footer class="fixed bottom-12 w-full text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/40">
            © 2024 QR Mágico. Tecnologia com Alma.
        </p>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: simulate transition to home after some time
            /*
            setTimeout(() => {
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.8s ease-in-out';
                // window.location.href = '/home';
            }, 3500);
            */

            // Adding a light mouse follow effect for the background blobs
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 20;
                const y = (e.clientY / window.innerHeight) * 20;
                const canvas = document.querySelector('main');
                if(canvas) {
                    canvas.style.transform = `translate(${x}px, ${y}px)`;
                    canvas.style.transition = 'transform 0.5s ease-out';
                }
            });
        });
    </script>
